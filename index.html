<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>PayBank Secure Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #00468c;
        }

        body {
            background: #f4f7f9;
            font-family: -apple-system, sans-serif;
            margin: 0;
        }

        .wrapper {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .amount-section {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 8px solid #f4f7f9;
        }

        .amount-val {
            font-size: 42px;
            font-weight: 800;
            color: #111;
        }

        .bank-grid {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 20px 15px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .bank-item {
            min-width: 70px;
            height: 70px;
            border: 2px solid #edf2f7;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .bank-item.active {
            border-color: var(--primary-color);
            background: #ebf4ff;
        }

        .bank-item img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: contain;
        }

        .qr-section {
            flex: 1;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #qr-box {
            padding: 15px;
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin: 10px 0;
            display: none;
        }

        .info-list {
            width: 100%;
            margin-top: 20px;
            text-align: left;
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            display: none;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row b {
            font-family: monospace;
            color: #111;
        }

        .btn-pay {
            width: 100%;
            background: var(--primary-color);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 20px;
            display: none;
        }

        .loader-mask {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="loader" class="loader-mask">
        <div class="spinner-border text-primary mb-3"></div>
        <div class="small text-muted">正在加密连接后端服务...</div>
    </div>

    <div class="wrapper">
        <div class="amount-section">
            <div class="small text-muted mb-1">应付金额 (Total Amount)</div>
            <div class="amount-val" id="amt">$0.00</div>
            <div class="badge bg-danger-subtle text-danger px-3 py-2 mt-2" style="font-size: 11px;">请务必转账准确金额，否则无法到账
            </div>
        </div>

        <div class="bank-grid" id="bank-list"></div>

        <div class="qr-section">
            <div id="placeholder" class="py-5 text-muted">
                <i class="fa-solid fa-building-columns fa-3x mb-3 opacity-25"></i>
                <div>请选择上方银行以获取付款码</div>
            </div>

            <div id="qr-box"></div>

            <div class="info-list" id="info-card">
                <div class="info-row"><span>收款姓名</span><b id="v-name">--</b></div>
                <div class="info-row"><span>收款账号</span><b id="v-acc">--</b></div>
                <div class="info-row"><span>商户单号</span><b id="v-ord">--</b></div>
            </div>

            <a href="#" class="btn-pay" id="btn-dl">
                <i class="fa-solid fa-mobile-screen-button me-2"></i>打开银行 APP 支付
            </a>

            <div class="mt-4 small text-muted" id="status-text">
                <span class="spinner-grow spinner-grow-sm me-1 text-success"></span>正在同步银行处理状态...
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://bank.paybank8.com';
        const params = new URLSearchParams(location.search);
        const orderNo = params.get('order_no') || params.get('trade_no');
        const token = params.get('token');

        async function init() {
            if (!orderNo) { alert("参数缺失"); return; }
            try {
                const res = await (await fetch(`${API_BASE}/api/get_order_details.php?order_no=${orderNo}&token=${token}`)).json();
                if (res.code !== 200) throw new Error(res.msg);

                const data = res.data;
                document.getElementById('amt').innerText = `$${parseFloat(data.real_amount).toFixed(2)}`;
                document.getElementById('v-ord').innerText = data.out_order_no || data.order_no;

                const grid = document.getElementById('bank-list');
                data.available_banks.forEach(b => {
                    const div = document.createElement('div');
                    div.className = 'bank-item';
                    div.id = 'bank-' + b.name;
                    div.onclick = () => selectBank(b.name);
                    div.innerHTML = `<img src="${b.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2830/2830284.png'">`;
                    grid.appendChild(div);
                });

                if (data.bank_name && data.khqr_string) showQR(data, true);

                document.getElementById('loader').style.display = 'none';
                setInterval(checkStatus, 4000);
            } catch (e) {
                document.getElementById('loader').innerHTML = `<div class="text-danger p-4 text-center">加载失败: ${e.message}</div>`;
            }
        }

        async function selectBank(name) {
            document.querySelectorAll('.bank-item').forEach(el => el.classList.remove('active'));
            document.getElementById('bank-' + name).classList.add('active');

            document.getElementById('placeholder').innerHTML = '<div class="spinner-border spinner-border-sm text-primary"></div><div class="mt-2 small">正在锁卡...</div>';

            try {
                const res = await (await fetch(`${API_BASE}/api/assign_card.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_no: orderNo, bank_name: name, token: token })
                })).json();

                if (res.code === 200) {
                    showQR(res.data);
                } else {
                    alert(res.msg);
                    document.getElementById('placeholder').innerHTML = '请换一家银行尝试';
                }
            } catch (e) { alert("网络超时"); }
        }

        function showQR(data, isInitial = false) {
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('amt').innerText = `$${parseFloat(data.real_amount).toFixed(2)}`;

            const qrBox = document.getElementById('qr-box');
            qrBox.style.display = 'block';
            qrBox.innerHTML = '';

            const qr = qrcode(0, 'L');
            qr.addData(data.khqr_string);
            qr.make();
            qrBox.innerHTML = qr.createImgTag(6);

            document.getElementById('v-name').innerText = data.account_name;
            document.getElementById('v-acc').innerText = data.account_no || data.card_no;
            document.getElementById('info-card').style.display = 'block';

            if (data.deeplink) {
                const btn = document.getElementById('btn-dl');
                btn.href = data.deeplink;
                btn.style.display = 'block';
            }
            if (isInitial) {
                const active = document.getElementById('bank-' + data.bank_name);
                if (active) active.classList.add('active');
            }
        }

        async function checkStatus() {
            try {
                const r = await (await fetch(`${API_BASE}/api/check_order.php?order_no=${orderNo}&token=${token}`)).json();
                if (r.status === 'paid') {
                    document.getElementById('status-text').innerHTML = '<span class="text-success">✅ 支付成功！正在返回商户...</span>';
                    setTimeout(() => {
                        const returnUrl = r.return_url || params.get('return_url');
                        if (returnUrl) {
                            location.href = returnUrl;
                        } else {
                            document.getElementById('app').innerHTML = '<div class="p-5 text-center"><i class="fa-solid fa-circle-check fa-4x text-success mb-3"></i><h3>支付成功</h3><p>您可以关闭此窗口了</p></div>';
                        }
                    }, 2000);
                    return; // 停止进一步检查
                }
            } catch (e) { }
        }

        init();
    </script>
</body>

</html>
